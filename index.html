<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>磨砂备忘录 · 标签版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#8b5cf6',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .glass {
        @apply bg-white/10 backdrop-blur-md border border-white/20 shadow-lg;
      }
      .glass-card {
        @apply glass rounded-xl transition-all duration-300 hover:shadow-xl hover:scale-[1.02] hover:bg-white/15;
      }
      .glass-input {
        @apply w-full bg-white/10 border border-white/20 rounded-lg px-3 py-2 text-white placeholder-white/60 focus:outline-none focus:border-primary/70 focus:ring-1 focus:ring-primary/70 transition-all;
      }
      .btn-primary {
        @apply bg-primary/80 hover:bg-primary text-white font-medium py-1.5 px-3 rounded-lg transition-all duration-200 hover:shadow-md active:scale-95 text-sm;
      }
      .btn-secondary {
        @apply glass hover:bg-white/20 text-white font-medium py-1.5 px-3 rounded-lg transition-all duration-200 hover:shadow-md active:scale-95 text-sm;
      }
      .btn-danger {
        @apply bg-red-500/80 hover:bg-red-500 text-white font-medium py-1.5 px-3 rounded-lg transition-all duration-200 hover:shadow-md active:scale-95 text-sm;
      }
      .tag {
        @apply inline-flex items-center px-2 py-0.5 rounded-full text-[10px] bg-white/20 text-white/80;
      }
      .tag-active {
        @apply bg-primary/70 text-white;
      }
      .line-clamp-1 {
        display: -webkit-box;
        -webkit-line-clamp: 1;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .line-clamp-3 {
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
    }
  </style>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      font-family: 'Inter', system-ui, sans-serif;
      color: white;
      overflow-x: hidden;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      transition: background 0.5s ease;
      -webkit-tap-highlight-color: transparent;
    }
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.3);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.5);
    }
    .fade-in {
      animation: fadeIn 0.25s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .scale-in {
      animation: scaleIn 0.25s ease forwards;
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    input, textarea, button {
      font-size: 16px !important; /* 手机不自动缩放 */
    }
  </style>
</head>
<body id="app-body">
  <div id="bg-layer" class="fixed inset-0 w-full h-full -z-10 bg-cover bg-center bg-no-repeat transition-all duration-500"></div>

  <!-- 顶部 -->
  <header class="glass sticky top-2 left-0 right-0 mx-2 z-50 rounded-2xl px-3 py-2 mb-3">
    <div class="container mx-auto flex flex-wrap items-center justify-between gap-2">
      <div class="flex items-center gap-1">
        <i class="fa-solid fa-book-open text-primary text-xl"></i>
        <h1 class="text-lg font-bold">磨砂备忘录</h1>
      </div>
      <div class="flex items-center gap-1">
        <button id="bg-setting-btn" class="btn-secondary px-2 py-1 text-xs">
          <i class="fa-solid fa-image mr-1"></i>壁纸
        </button>
        <button id="backup-btn" class="btn-secondary px-2 py-1 text-xs">
          <i class="fa-solid fa-database mr-1"></i>备份
        </button>
        <button id="add-memo-btn" class="btn-primary px-2 py-1 text-xs">
          <i class="fa-solid fa-plus mr-1"></i>新建
        </button>
      </div>
    </div>
  </header>

  <main class="container mx-auto px-2 pb-20">
    <!-- 标签筛选栏 -->
    <div id="tag-container" class="glass rounded-xl px-3 py-2 mb-3 flex items-center gap-2 overflow-x-auto flex-nowrap scrollbar-hide">
      <span class="tag tag-active cursor-pointer" data-tag="all">全部</span>
    </div>

    <!-- 空状态 -->
    <div id="empty-state" class="hidden glass rounded-2xl p-8 text-center max-w-xs mx-auto">
      <i class="fa-solid fa-note-sticky text-5xl text-white/30 mb-3"></i>
      <h2 class="text-base font-semibold mb-1">暂无备忘录</h2>
      <p class="text-white/60 mb-4 text-sm">点击右上角「新建」开始记录</p>
      <button onclick="document.getElementById('add-memo-btn').click()" class="btn-primary">
        <i class="fa-solid fa-plus mr-1"></i> 创建备忘录
      </button>
    </div>

    <!-- 备忘录网格 -->
    <div id="memo-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2"></div>
  </main>

  <!-- 编辑弹窗 -->
  <div id="memo-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-2 bg-black/30 backdrop-blur-sm">
    <div class="glass rounded-2xl w-full max-w-xl max-h-[92vh] overflow-hidden scale-in">
      <div class="flex items-center justify-between p-3 border-b border-white/10">
        <h3 id="modal-title" class="text-base font-bold">新建备忘录</h3>
        <button id="close-memo-modal" class="text-white/70 hover:text-white text-lg p-1">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="p-3 overflow-y-auto max-h-[calc(92vh-120px)]">
        <form id="memo-form" class="flex flex-col gap-3">
          <input type="hidden" id="memo-id">
          <div class="flex flex-col gap-1">
            <label class="text-xs font-medium">标题</label>
            <input type="text" id="memo-title" class="glass-input" placeholder="标题" required>
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-xs font-medium">标签（用逗号分隔）</label>
            <input type="text" id="memo-tags" class="glass-input" placeholder="例如：工作,生活,学习">
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-xs font-medium">封面颜色</label>
            <div class="flex items-center gap-2">
              <input type="color" id="memo-color" class="w-10 h-10 rounded-lg border-0 cursor-pointer" value="#8b5cf6">
              <span id="color-preview-text" class="text-white/70 text-sm">#8b5cf6</span>
            </div>
          </div>
          <div class="flex flex-col gap-1">
            <div class="flex items-center justify-between">
              <label class="text-xs font-medium">内容</label>
              <button type="button" id="copy-content-btn" class="btn-secondary text-xs py-1 px-2">
                <i class="fa-solid fa-copy mr-1"></i>复制
              </button>
            </div>
            <textarea id="memo-content" rows="10" class="glass-input resize-none" placeholder="内容..." required></textarea>
          </div>
        </form>
      </div>
      <div class="flex items-center justify-end gap-2 p-3 border-t border-white/10">
        <button id="delete-memo-btn" class="btn-danger hidden text-xs">
          <i class="fa-solid fa-trash mr-1"></i>删除
        </button>
        <div class="flex-1"></div>
        <button id="cancel-memo-btn" class="btn-secondary text-xs">取消</button>
        <button id="save-memo-btn" class="btn-primary text-xs">
          <i class="fa-solid fa-save mr-1"></i>保存
        </button>
      </div>
    </div>
  </div>

  <!-- 壁纸弹窗 -->
  <div id="bg-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-2 bg-black/30 backdrop-blur-sm">
    <div class="glass rounded-2xl w-full max-w-md scale-in">
      <div class="flex items-center justify-between p-3 border-b border-white/10">
        <h3 class="text-base font-bold">更换壁纸</h3>
        <button id="close-bg-modal" class="text-white/70 hover:text-white text-lg p-1">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="p-3 flex flex-col gap-3">
        <div class="flex flex-col gap-1">
          <label class="text-xs font-medium">上传图片</label>
          <input type="file" id="bg-upload" accept="image/*" class="glass-input text-xs file:mr-2 file:py-1 file:px-2 file:rounded-lg file:border-0 file:bg-primary/70 file:text-white file:cursor-pointer">
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-xs font-medium">预览</label>
          <div id="bg-preview" class="w-full h-32 rounded-xl bg-cover bg-center border border-white/20"></div>
        </div>
        <div class="flex items-center gap-2 pt-1">
          <button id="reset-bg-btn" class="btn-secondary flex-1 text-xs">恢复默认</button>
          <button id="save-bg-btn" class="btn-primary flex-1 text-xs">应用</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 备份弹窗 -->
  <div id="backup-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-2 bg-black/30 backdrop-blur-sm">
    <div class="glass rounded-2xl w-full max-w-md scale-in">
      <div class="flex items-center justify-between p-3 border-b border-white/10">
        <h3 class="text-base font-bold">备份管理</h3>
        <button id="close-backup-modal" class="text-white/70 hover:text-white text-lg p-1">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="p-3 flex flex-col gap-3">
        <div class="glass rounded-xl p-3">
          <h4 class="text-sm font-semibold mb-1">导出备份</h4>
          <p class="text-xs text-white/60 mb-2">导出所有数据</p>
          <button id="export-btn" class="btn-primary w-full text-xs">导出</button>
        </div>
        <div class="glass rounded-xl p-3">
          <h4 class="text-sm font-semibold mb-1">导入备份</h4>
          <p class="text-xs text-white/60 mb-2">会覆盖当前数据</p>
          <input type="file" id="import-file" accept=".json" class="glass-input text-xs file:mr-2 file:py-1 file:px-2 mb-2">
          <button id="import-btn" class="btn-danger w-full text-xs">导入并覆盖</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 提示 -->
  <div id="toast" class="fixed bottom-4 left-1/2 -translate-x-1/2 z-[200] hidden glass rounded-lg px-4 py-2 max-w-[200px] text-center text-sm fade-in">
    <span id="toast-text">操作成功</span>
  </div>

  <script>
    let memoList = [];
    let currentTag = "all";
    const STORAGE_KEY = "glass-memo-data-tag";
    const BG_STORAGE_KEY = "glass-memo-bg-tag";

    document.addEventListener("DOMContentLoaded", () => {
      initData();
      renderMemoList();
      renderTags();
      initBackground();
      bindEvents();
    });

    // 初始化数据
    function initData() {
      const d = localStorage.getItem(STORAGE_KEY);
      if (d) {
        try { memoList = JSON.parse(d); } catch (e) { memoList = []; }
      }
    }

    // 背景
    function initBackground() {
      const bg = localStorage.getItem(BG_STORAGE_KEY);
      const layer = document.getElementById("bg-layer");
      const body = document.getElementById("app-body");
      const prev = document.getElementById("bg-preview");
      if (bg) {
        layer.style.backgroundImage = `url(${bg})`;
        body.style.background = "#1e293b";
        prev.style.backgroundImage = `url(${bg})`;
      } else {
        layer.style.backgroundImage = "none";
        body.style.background = "linear-gradient(135deg, #667eea 0%, #764ba2 100%)";
        prev.style.backgroundImage = "linear-gradient(135deg, #667eea 0%, #764ba2 100%)";
      }
    }

    // 渲染标签筛选栏
    function renderTags() {
      const container = document.getElementById("tag-container");
      const set = new Set();
      memoList.forEach(m => {
        if (m.tags) {
          m.tags.split(",").map(t => t.trim()).filter(t => t).forEach(t => set.add(t));
        }
      });
      const arr = Array.from(set);
      let html = `<span class="tag tag-active cursor-pointer" data-tag="all">全部</span>`;
      arr.forEach(tag => {
        const cls = currentTag === tag ? "tag tag-active" : "tag";
        html += `<span class="${cls} cursor-pointer" data-tag="${tag}">${tag}</span>`;
      });
      container.innerHTML = html;
      // 绑定点击
      container.querySelectorAll(".tag").forEach(el => {
        el.addEventListener("click", () => {
          currentTag = el.dataset.tag;
          renderTags();
          renderMemoList();
        });
      });
    }

    // 渲染列表
    function renderMemoList() {
      const grid = document.getElementById("memo-grid");
      const empty = document.getElementById("empty-state");
      let list = [...memoList];
      if (currentTag !== "all") {
        list = list.filter(m => m.tags && m.tags.split(",").map(t=>t.trim()).includes(currentTag));
      }
      if (list.length === 0) {
        grid.innerHTML = "";
        empty.classList.remove("hidden");
        return;
      }
      empty.classList.add("hidden");
      let html = "";
      list.forEach(m => {
        const date = new Date(m.createTime).toLocaleDateString();
        const tagsArr = m.tags ? m.tags.split(",").map(t=>t.trim()).filter(t=>t) : [];
        let tagHtml = "";
        tagsArr.slice(0,2).forEach(t => { tagHtml += `<span class="tag mr-1">${t}</span>`; });
        html += `
        <div class="glass-card overflow-hidden cursor-pointer fade-in" data-id="${m.id}">
          <div class="h-2 w-full" style="background:${m.color}"></div>
          <div class="p-3">
            <h3 class="text-base font-bold mb-1 line-clamp-1">${m.title}</h3>
            <div class="mb-1 flex flex-wrap gap-1">${tagHtml}</div>
            <p class="text-white/70 text-xs mb-2 line-clamp-2 h-[2.4em]">${m.content}</p>
            <div class="flex items-center justify-between text-[10px] text-white/50">
              <span><i class="fa-solid fa-calendar mr-1"></i>${date}</span>
              <button class="copy-btn hover:text-white" data-id="${m.id}">
                <i class="fa-solid fa-copy"></i>
              </button>
            </div>
          </div>
        </div>`;
      });
      grid.innerHTML = html;

      grid.querySelectorAll(".glass-card").forEach(card => {
        card.addEventListener("click", e => {
          if (!e.target.closest(".copy-btn")) openMemoModal(card.dataset.id);
        });
      });
      grid.querySelectorAll(".copy-btn").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          const m = memoList.find(x => x.id === btn.dataset.id);
          if (m) copyContent(m.content);
        });
      });
    }

    // 打开编辑
    function openMemoModal(id = null) {
      const modal = document.getElementById("memo-modal");
      const title = document.getElementById("modal-title");
      const mid = document.getElementById("memo-id");
      const mtitle = document.getElementById("memo-title");
      const mtags = document.getElementById("memo-tags");
      const mcolor = document.getElementById("memo-color");
      const mcont = document.getElementById("memo-content");
      const del = document.getElementById("delete-memo-btn");
      const cpt = document.getElementById("color-preview-text");

      modal.classList.remove("hidden"); modal.classList.add("flex");
      document.body.style.overflow = "hidden";

      if (id) {
        const m = memoList.find(x => x.id === id);
        if (m) {
          title.textContent = "编辑备忘录";
          mid.value = m.id;
          mtitle.value = m.title || "";
          mtags.value = m.tags || "";
          mcolor.value = m.color || "#8b5cf6";
          mcont.value = m.content || "";
          cpt.textContent = m.color;
          del.classList.remove("hidden");
        }
      } else {
        title.textContent = "新建备忘录";
        document.getElementById("memo-form").reset();
        mid.value = "";
        mtags.value = "";
        mcolor.value = "#8b5cf6";
        cpt.textContent = "#8b5cf6";
        del.classList.add("hidden");
      }
    }

    function closeMemoModal() {
      document.getElementById("memo-modal").classList.add("hidden");
      document.body.style.overflow = "";
    }

    // 保存
    function saveMemo() {
      const id = document.getElementById("memo-id").value;
      const title = document.getElementById("memo-title").value.trim();
      const tags = document.getElementById("memo-tags").value.trim();
      const color = document.getElementById("memo-color").value;
      const content = document.getElementById("memo-content").value.trim();
      if (!title || !content) { showToast("标题和内容不能为空"); return; }

      if (id) {
        const i = memoList.findIndex(x => x.id === id);
        if (i !== -1) {
          memoList[i] = { ...memoList[i], title, tags, color, content, updateTime: Date.now() };
        }
        showToast("已保存");
      } else {
        memoList.unshift({
          id: Date.now().toString(), title, tags, color, content,
          createTime: Date.now(), updateTime: Date.now()
        });
        showToast("创建成功");
      }

      localStorage.setItem(STORAGE_KEY, JSON.stringify(memoList));
      renderMemoList(); renderTags(); closeMemoModal();
    }

    // 删除
    function deleteMemo() {
      const id = document.getElementById("memo-id").value;
      if (!id) return;
      if (!confirm("确定删除？")) return;
      memoList = memoList.filter(x => x.id !== id);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(memoList));
      renderMemoList(); renderTags(); closeMemoModal();
      showToast("已删除");
    }

    // 复制
    function copyContent(text) {
      navigator.clipboard.writeText(text).then(()=>showToast("已复制")).catch(()=>{
        const t = document.createElement("textarea");
        t.value = text; document.body.appendChild(t); t.select(); document.execCommand("copy");
        document.body.removeChild(t); showToast("已复制");
      });
    }

    // 导出
    function exportBackup() {
      const data = { memoList, bg: localStorage.getItem(BG_STORAGE_KEY), time: new Date().toISOString() };
      const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "备忘录备份_标签版.json";
      a.click(); URL.revokeObjectURL(a.href);
      showToast("导出成功");
    }

    // 导入
    function importBackup(file) {
      if (!file) return;
      if (!confirm("导入会覆盖当前数据，确定？")) return;
      const r = new FileReader();
      r.onload = e => {
        try {
          const d = JSON.parse(e.target.result);
          if (d.memoList) {
            memoList = d.memoList;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(memoList));
            if (d.bg) localStorage.setItem(BG_STORAGE_KEY, d.bg);
            else localStorage.removeItem(BG_STORAGE_KEY);
            renderMemoList(); renderTags(); initBackground();
            showToast("导入成功");
          }
        } catch (e) { showToast("文件错误"); }
      };
      r.readAsText(file);
    }

    // 提示
    function showToast(text) {
      const t = document.getElementById("toast");
      document.getElementById("toast-text").textContent = text;
      t.classList.remove("hidden");
      setTimeout(()=>t.classList.add("hidden"), 1800);
    }

    // 事件
    function bindEvents() {
      document.getElementById("add-memo-btn").onclick = () => openMemoModal();
      document.getElementById("close-memo-modal").onclick = closeMemoModal;
      document.getElementById("cancel-memo-btn").onclick = closeMemoModal;
      document.getElementById("save-memo-btn").onclick = saveMemo;
      document.getElementById("delete-memo-btn").onclick = deleteMemo;
      document.getElementById("copy-content-btn").onclick = ()=>copyContent(document.getElementById("memo-content").value);
      document.getElementById("memo-color").addEventListener("input", e=>{
        document.getElementById("color-preview-text").textContent = e.target.value;
      });

      // 壁纸
      document.getElementById("bg-setting-btn").onclick = ()=>{
        document.getElementById("bg-modal").classList.remove("hidden");
      };
      document.getElementById("close-bg-modal").onclick = ()=>{
        document.getElementById("bg-modal").classList.add("hidden");
      };
      document.getElementById("bg-upload").addEventListener("change", e=>{
        const f = e.target.files[0];
        if (!f) return;
        const r = new FileReader();
        r.onload = ev=>{
          document.getElementById("bg-preview").style.backgroundImage = `url(${ev.target.result})`;
        };
        r.readAsDataURL(f);
      });
      document.getElementById("save-bg-btn").onclick = ()=>{
        const f = document.getElementById("bg-upload").files[0];
        if (!f) { showToast("请选择图片"); return; }
        const r = new FileReader();
        r.onload = ev=>{
          localStorage.setItem(BG_STORAGE_KEY, ev.target.result);
          initBackground();
          document.getElementById("bg-modal").classList.add("hidden");
          showToast("已应用");
        };
        r.readAsDataURL(f);
      };
      document.getElementById("reset-bg-btn").onclick = ()=>{
        localStorage.removeItem(BG_STORAGE_KEY);
        document.getElementById("bg-upload").value = "";
        initBackground(); showToast("已恢复默认");
      };

      // 备份
      document.getElementById("backup-btn").onclick = ()=>{
        document.getElementById("backup-modal").classList.remove("hidden");
      };
      document.getElementById("close-backup-modal").onclick = ()=>{
        document.getElementById("backup-modal").classList.add("hidden");
      };
      document.getElementById("export-btn").onclick = exportBackup;
      document.getElementById("import-btn").onclick = ()=>{
        importBackup(document.getElementById("import-file").files[0]);
      };

      document.getElementById("memo-form").addEventListener("submit", e=>{
        e.preventDefault(); saveMemo();
      });
    }
  </script>
</body>
</html>
